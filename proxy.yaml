dns:
  listen: ":53"
  proxy_ip: "10.99.0.2"

proxy:
  http_listen: ":80"
  https_listen: ":443"

tls:
  ca_cert: "/etc/iron-proxy/ca.crt"
  ca_key: "/etc/iron-proxy/ca.key"

transforms:
  - name: allowlist
    config:
      domains:
        - "github.com"
        - "*.github.com"
        - "*.githubusercontent.com"
        - "*.actions.githubusercontent.com"
        - "*.pkg.github.com"
        - "*.blob.core.windows.net"
        - "api.github.com"
        - "nodejs.org"
        - "*.nodejs.org"
        - "httpbin.org"
      cidrs:
        - "10.99.0.0/24"

  - name: secrets
    config:
      source: env
      secrets:
        - var: DEMO_API_KEY
          proxy_value: "proxy-demo-key-12345"
          match_headers: ["Authorization"]
          hosts:
            - name: "httpbin.org"

log:
  level: "info"
